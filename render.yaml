services:
  - type: web
    name: telegram-stock-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: SUPER_ADMINS
        sync: false
      - key: APP_TIMEZONE
        value: Asia/Phnom_Penh
      - key: PORT
        value: 10000
